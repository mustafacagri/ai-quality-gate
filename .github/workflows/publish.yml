name: Modern Trusted Publish

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      issues: write
      packages: write
      pull-requests: write

    steps:
      # 1️⃣ Checkout
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      # 2️⃣ Setup Node.js for npm
      - name: Setup Node.js for npm
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      # 3️⃣ Install & Build
      - name: Install & Build
        run: |
          yarn install --frozen-lockfile
          yarn build

      # 4️⃣ Versioning + changelog + git tag
      - name: Run semantic-release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 5️⃣ Sync repository state (deterministic)
      - name: Sync repository state
        run: |
          git fetch origin main
          git reset --hard origin/main

      # 6️⃣ Publish to npm via OIDC (Trusted Publishers)
      # semantic-release exits 0 when there is nothing to release; package.json then matches an
      # already-published version — skip publish to avoid E422 / "cannot publish over".
      # Provenance requires a public *source* repo; private sources must disable it.
      - name: Publish to npm
        run: |
          set -euo pipefail
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view "$NAME" version 2>/dev/null || true)
          if [ -n "$PUBLISHED" ] && [ "$PUBLISHED" = "$VERSION" ]; then
            echo "Skipping npm publish: v${VERSION} is already on the registry."
            exit 0
          fi
          if [ "${{ github.event.repository.private }}" = "true" ]; then
            NPM_CONFIG_PROVENANCE=false npm publish --access public
          else
            npm publish --provenance --access public
          fi

      # 7️⃣ Publish to GitHub Packages
      - name: Setup Node.js for GitHub Packages
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@mustafacagri'

      - name: Publish to GitHub Packages
        run: |
          set -euo pipefail
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view "$NAME" version 2>/dev/null || true)
          if [ -n "$PUBLISHED" ] && [ "$PUBLISHED" = "$VERSION" ]; then
            echo "Skipping GitHub Packages publish: v${VERSION} is already published."
            exit 0
          fi
          npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
