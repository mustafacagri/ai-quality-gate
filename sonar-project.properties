# SonarQube Project Configuration for ai-quality-gate

sonar.projectKey=ai-quality-gate
sonar.projectName=AI Quality Gate MCP Server
sonar.projectVersion=0.1.0

# Sources
sonar.sources=src
sonar.exclusions=src/eslint/**,**/*.test.ts,**/*.spec.ts

# Tests
sonar.tests=src
sonar.test.inclusions=**/*.test.ts,**/*.spec.ts

# Coverage
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# Encoding
sonar.sourceEncoding=UTF-8

# New Code Definition - Use "Previous Version" to show all code as "Overall"
# Or set to empty to disable New Code period
sonar.newCode.referenceBranch=

