name: Modern Trusted Publish

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      # Explicit registry so unscoped package name always targets npmjs (not another host).
      NPM_REGISTRY: https://registry.npmjs.org
    permissions:
      contents: write
      id-token: write
      issues: write
      packages: write
      pull-requests: write

    steps:
      # 1️⃣ Checkout
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      # 2️⃣ Setup Node.js for npm
      - name: Setup Node.js for npm
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      # 3️⃣ Install & Build
      - name: Install & Build
        run: |
          yarn install --frozen-lockfile
          yarn build

      # 4️⃣ Versioning + changelog + git tag
      - name: Run semantic-release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 5️⃣ Sync repository state (deterministic)
      - name: Sync repository state
        run: |
          git fetch origin main
          git reset --hard origin/main

      # 6️⃣ Publish to npm via OIDC (Trusted Publishers)
      # semantic-release exits 0 when there is nothing to release; package.json then matches an
      # already-published version — skip publish to avoid E422 / "cannot publish over".
      # Provenance requires a public *source* repo; private sources must disable it.
      - name: Publish to npm
        run: |
          set -euo pipefail
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view "$NAME" version --registry "$NPM_REGISTRY" 2>/dev/null || true)
          if [ -n "$PUBLISHED" ] && [ "$PUBLISHED" = "$VERSION" ]; then
            echo "Skipping npm publish: v${VERSION} is already on ${NPM_REGISTRY}."
            exit 0
          fi
          if [ "${{ github.event.repository.private }}" = "true" ]; then
            NPM_CONFIG_PROVENANCE=false npm publish --access public --registry "$NPM_REGISTRY"
          else
            npm publish --provenance --access public --registry "$NPM_REGISTRY"
          fi

      # GitHub Packages requires a scoped package name (@owner/name). This project is unscoped
      # (ai-quality-gate); a second setup-node with only @scope:registry still leaves the default
      # registry as npmjs, so `npm publish` here republished to npm and caused E409 duplicate.
      # Publish to GPR only after renaming to e.g. @mustafacagri/ai-quality-gate and configuring npm.
